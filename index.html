<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YOLO ONNX Detection</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            width: 450px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 30px;
            backdrop-filter: blur(12px);
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 15px;
            font-size: 26px;
            font-weight: 600;
        }

        .upload-box {
            border: 2px dashed #fff;
            padding: 25px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-box:hover {
            background: rgba(255,255,255,0.1);
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            margin-top: 18px;
            padding: 12px 25px;
            background: #ffdd57;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #f5c842;
            transform: scale(1.05);
        }

        img {
            margin-top: 20px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 5px 18px rgba(0,0,0,0.3);
        }

        .result-title {
            margin-top: 20px;
            font-size: 22px;
        }
    </style>

    <script>
        function triggerUpload() {
            document.getElementById("fileInput").click();
        }

        function previewFilename() {
            let file = document.getElementById("fileInput").files[0];
            if (file) {
                document.getElementById("fileLabel").innerHTML = "Selected: " + file.name;
            }
        }
    </script>

</head>
<body>

    <div class="container">
        <h2>YOLO ONNX Image Detection</h2>

        <form action="/predict" method="POST" enctype="multipart/form-data">

            <div class="upload-box" onclick="triggerUpload()">
                <p id="fileLabel">Click to upload an image</p>
                <input type="file" id="fileInput" name="image" accept="image/*" required onchange="previewFilename()">
            </div>

            <button class="btn" type="submit">Run Detection</button>
        </form>

        {% if output_image %}
            <div class="result-title">Detection Result</div>
            <img src="{{ url_for('static', filename=output_image) }}">
        {% endif %}
    </div>

</body>
</html>
